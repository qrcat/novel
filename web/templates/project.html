{% extends "base.html" %}
{% block title %}小说项目 — Novel Agents{% endblock %}
{% block head %}
<style>
:root {
  --bg: #0c0b0f;
  --surface: #16141a;
  --surface2: #1e1b24;
  --border: #2a2733;
  --text: #e8e4df;
  --muted: #7a7485;
  --accent: #c9a84c;
  --accent2: #8b5cf6;
  --danger: #e05c5c;
  --success: #4caf7d;
  --glow: rgba(201,168,76,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(201,168,76,0.07) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 100%, rgba(139,92,246,0.06) 0%, transparent 45%);
}

/* ── 顶栏 ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: rgba(22,20,26,0.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
.logo-mark { color: var(--accent); font-size: 1.4rem; }
.logo-text { font-size: 1.1rem; font-weight: 300; letter-spacing: 0.05em; }
.header-actions { display: flex; gap: 0.75rem; align-items: center; }

/* ── 按钮 ── */
.btn {
  padding: 0.45rem 1.1rem;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.875rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
  font-weight: 400;
}
.btn-primary {
  background: var(--accent);
  color: #0c0b0f;
  border-color: var(--accent);
}
.btn-primary:hover { background: #d4b55a; box-shadow: 0 0 16px rgba(201,168,76,0.3); }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}
.btn-ghost:hover { border-color: var(--muted); color: var(--text); }
.btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.icon-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.9rem;
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  transition: all 0.15s;
}
.icon-btn:hover { color: var(--text); background: var(--surface2); }
.icon-btn.danger:hover { color: var(--danger); }

/* ── 布局 ── */
.layout {
  display: grid;
  grid-template-columns: 340px 1fr 320px;
  gap: 0;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* ── 左侧面板 ── */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.panel-title {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
  font-family: 'DM Mono', monospace;
}

.info-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.3rem 0;
  font-size: 0.875rem;
  border-bottom: 1px solid var(--border);
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-value { color: var(--text); font-weight: 400; }

/* 模型配置 */
.config-section { display: flex; flex-direction: column; gap: 0.6rem; }
.form-group { display: flex; flex-direction: column; gap: 0.25rem; }
.form-label {
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}
input, select, textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 0.5rem 0.7rem;
  width: 100%;
  transition: border-color 0.2s;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
}
textarea { resize: vertical; min-height: 80px; }
select { cursor: pointer; }

/* 角色列表 */
.char-tabs {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  margin-bottom: 0.75rem;
}
.char-tab {
  flex: 1;
  padding: 0.4rem;
  text-align: center;
  font-size: 0.72rem;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.char-tab:hover { color: var(--text); }
.char-tab.active { color: var(--accent); background: var(--surface2); }

.char-list { display: flex; flex-direction: column; gap: 0.5rem; }
.char-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem;
  font-size: 0.85rem;
  transition: all 0.15s;
  position: relative;
}
.char-card:hover { border-color: rgba(201,168,76,0.4); }
.char-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.3rem;
}
.char-name { color: var(--accent); font-weight: 500; }
.char-role {
  font-size: 0.65rem;
  font-family: 'DM Mono', monospace;
  background: var(--surface2);
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  color: var(--muted);
  border: 1px solid var(--border);
}
.char-role.protagonist { color: var(--accent2); border-color: rgba(139,92,246,0.4); }
.char-role.antagonist { color: var(--danger); border-color: rgba(224,92,92,0.3); }
.char-role.supporting { color: var(--success); border-color: rgba(76,175,125,0.3); }
.char-desc { color: var(--muted); font-size: 0.78rem; line-height: 1.6; }
.char-actions {
  display: flex;
  gap: 0.25rem;
  margin-top: 0.5rem;
  justify-content: flex-end;
}
.char-edit-form {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding: 0.25rem 0;
}
.char-form-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

/* 角色弹窗 */
.char-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  display: none;
}
.char-modal-overlay.show { display: flex; }
.char-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  width: 440px;
  max-width: 95vw;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  animation: slideUp 0.2s ease;
}
.char-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.char-modal-title { font-size: 1rem; color: var(--accent); }
.char-badge {
  font-size: 0.65rem;
  font-family: 'DM Mono', monospace;
  background: var(--accent);
  color: #0c0b0f;
  padding: 0.1rem 0.5rem;
  border-radius: 4px;
  font-weight: 500;
}

/* ── 中间主区 ── */
.main-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(22,20,26,0.7);
}
.toolbar-label {
  font-size: 0.8rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-right: auto;
}
.toolbar .btn { font-size: 0.8rem; padding: 0.4rem 0.9rem; }

/* 大纲显示 */
.outline-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 2rem;
}
.outline-empty {
  color: var(--muted);
  text-align: center;
  padding: 3rem;
  font-size: 0.9rem;
  line-height: 2;
}

/* 章节块 */
.chapter-block {
  margin-bottom: 1.5rem;
  padding: 1rem 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.2s;
}
.chapter-block:hover { border-color: rgba(201,168,76,0.4); }
.chapter-block.current {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--glow);
}
.chapter-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}
.chapter-title {
  font-size: 1.05rem;
  color: var(--accent);
  margin: 0.3rem 0 0.5rem;
}
.chapter-one-sentence {
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
  border-left: 2px solid var(--border);
  padding-left: 0.75rem;
  margin: 0.5rem 0;
  line-height: 1.6;
}
.chapter-meta {
  font-size: 0.78rem;
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.chapter-meta span {
  background: var(--surface2);
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
}

/* 主题展示 */
.theme-block {
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(139,92,246,0.08));
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.theme-text { font-size: 1rem; color: var(--accent); }
.theme-purpose { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; }

/* 角色弧线 */
.arc-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  margin-bottom: 0.75rem;
}
.arc-name { color: var(--accent2); font-size: 0.85rem; font-weight: 500; }
.arc-arrow { font-size: 0.75rem; color: var(--muted); margin: 0.2rem 0; }

/* 世界观 */
.world-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.world-rule {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.3rem 0;
  font-size: 0.82rem;
  color: var(--text);
}
.world-rule::before { content: '◈'; color: var(--accent); flex-shrink: 0; }

/* ── 右侧面板 ── */
.right-panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: rgba(22,20,26,0.8);
}
.tab {
  flex: 1;
  padding: 0.6rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
}

/* 生成控制 */
.controls {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}
.control-row { display: flex; gap: 0.5rem; align-items: center; }
.slider-label { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
input[type=range] {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  border: none;
  padding: 0;
  cursor: pointer;
  accent-color: var(--accent);
}
input[type=range]:focus { outline: none; }

/* 输出日志 */
.output-box {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow-y: auto;
  padding: 0.75rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  min-height: 200px;
  max-height: 50vh;
}
.output-box:empty::before { content: '等待生成…'; color: var(--muted); }
.log-entry { margin-bottom: 0.25rem; }
.log-phase { color: var(--accent2); }
.log-error { color: var(--danger); }
.log-success { color: var(--success); }
.log-muted { color: var(--muted); }
.log-tool { color: var(--accent); font-size: 0.72rem; }

/* 正文区 */
.novel-text {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.5rem;
  font-size: 0.9rem;
  line-height: 2;
  color: var(--text);
  white-space: pre-wrap;
}
.novel-text .chapter-marker {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin: 2rem 0 0.5rem;
  display: block;
}
.novel-text .dialogue {
  color: var(--text);
  margin: 0.25rem 0;
}
.novel-text .separator {
  text-align: center;
  color: var(--border);
  margin: 1.5rem 0;
  font-size: 0.7rem;
  letter-spacing: 0.5em;
}

/* 进度条 */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.5rem;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}

/* 通知 */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 0.75rem 1.25rem;
  font-size: 0.85rem;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 999;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } }
.toast.error { border-color: var(--danger); color: var(--danger); }
</style>
{% endblock %}

{% block body %}
<div class="header">
  <div class="logo" onclick="location.href='/'">
    <span class="logo-mark">✦</span>
    <span class="logo-text">Novel Agents</span>
  </div>
  <div class="header-actions">
    <span class="toolbar-label" id="project-title"></span>
    <button class="btn btn-ghost" onclick="saveProject()">💾 保存</button>
    <button class="btn btn-danger" onclick="deleteProject()">🗑 删除</button>
  </div>
</div>

<div class="layout">

  <!-- ── 左侧面板 ── -->
  <aside class="sidebar">

    <div>
      <div class="panel-title">小说信息</div>
      <div class="info-block">
        <div class="info-row"><span class="info-label">标题</span><span class="info-value" id="info-title">—</span></div>
        <div class="info-row"><span class="info-label">类型</span><span class="info-value" id="info-genre">—</span></div>
        <div class="info-row"><span class="info-label">章节</span><span class="info-value" id="info-chapter">—</span></div>
        <div class="info-row"><span class="info-label">角色</span><span class="info-value" id="info-chars">—</span></div>
        <div class="info-row"><span class="info-label">状态</span><span class="info-value" id="info-status">—</span></div>
      </div>
    </div>

    <div>
      <div class="panel-title">模型配置</div>
      <div class="config-section">
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="password" id="cfg-api-key" placeholder="sk-…">
        </div>
        <div class="form-group">
          <label class="form-label">Base URL</label>
          <input type="text" id="cfg-base-url" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
        </div>
        <div class="form-group">
          <label class="form-label">模型</label>
          <select id="cfg-model">
            <option value="qwen-plus">通义千问 Plus</option>
            <option value="qwen-max">通义千问 Max</option>
            <option value="qwen2.5-72b-instruct">Qwen2.5 72B</option>
            <option value="deepseek-chat">DeepSeek Chat</option>
            <option value="gpt-4o">GPT-4o</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Temperature</label>
          <div class="control-row">
            <input type="range" id="cfg-temp" min="0.1" max="1.5" step="0.05" value="0.8">
            <span class="slider-label" id="temp-label">0.80</span>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel-title">角色列表</div>
      <div class="char-list" id="char-list">
        <div id="char-empty" class="info-block" style="text-align:center; color:var(--muted); font-size:0.85rem;">
          暂无角色，点击下方按钮添加
        </div>
      </div>
      <div style="margin-top:0.75rem; display:flex; gap:0.5rem;">
        <button class="btn btn-primary" onclick="openCharModal()" style="flex:1; font-size:0.78rem; padding:0.4rem 0.75rem;">
          ＋ 添加角色
        </button>
      </div>
    </div>

  </aside>

  <!-- ── 中间主区 ── -->
  <section class="main-area">

    <div class="toolbar">
      <span class="toolbar-label" id="toolbar-status">📖 大纲</span>
      <button class="btn btn-primary" id="btn-outline" onclick="generateOutline()">🔮 生成大纲</button>
      <button class="btn btn-ghost" id="btn-round" onclick="generateRound()" disabled>✍ 写一段</button>
      <button class="btn btn-ghost" onclick="showTab('novel')">📄 正文</button>
    </div>

    <div class="outline-scroll" id="outline-panel">
      <div class="outline-empty" id="outline-empty">
        <p>✨ 还没有生成大纲</p>
        <p>配置好模型后，点击「生成大纲」开始</p>
      </div>
      <div id="outline-content" style="display:none"></div>
    </div>

    <div class="novel-text" id="novel-panel" style="display:none"></div>

  </section>

  <!-- ── 右侧面板 ── -->
  <aside class="right-panel">

    <div class="panel-tabs">
      <div class="tab active" onclick="showTab('output')">📋 输出</div>
      <div class="tab" onclick="showTab('novel')">📖 正文</div>
      <div class="tab" onclick="showTab('outline')">🗺 大纲</div>
    </div>

    <div class="panel-content" id="output-panel">
      <div class="controls">
        <button class="btn btn-primary" id="btn-outline2" onclick="generateOutline()" style="width:100%">
          🔮 生成大纲
        </button>
        <button class="btn btn-ghost" id="btn-round2" onclick="generateRound()" disabled style="width:100%">
          ✍ 写一段（3轮）
        </button>
        <div class="progress-bar" id="progress-bar" style="display:none">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="output-box" id="output-box"></div>
    </div>

    <div class="panel-content" id="novel-tab-panel" style="display:none">
      <div class="novel-text" id="novel-tab-content"></div>
    </div>

  </aside>

</div>

<div id="toast" class="toast" style="display:none"></div>

<!-- 角色弹窗 -->
<div class="char-modal-overlay" id="char-modal-overlay" onclick="if(event.target===this)closeCharModal()">
  <div class="char-modal">
    <div class="char-modal-header">
      <span class="char-modal-title" id="char-modal-title">添加角色</span>
      <button class="icon-btn" onclick="closeCharModal()">✕</button>
    </div>
    <form id="char-form" onsubmit="submitCharForm(event)">
      <input type="hidden" id="char-edit-name">
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input type="text" id="char-name" placeholder="例如：林晚棠" required maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label">定位</label>
        <select id="char-role">
          <option value="">未设定</option>
          <option value="protagonist">主角</option>
          <option value="supporting">配角</option>
          <option value="antagonist">反派</option>
          <option value="tool">工具人</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">外貌特征</label>
        <textarea id="char-appearance" rows="2" placeholder="描述身高、体型、发型、发色、标志性特征…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">性格特点</label>
        <textarea id="char-personality" rows="3" placeholder="角色性格的核心特征，如：冷静理性、外冷内热、阴郁偏执…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">背景故事</label>
        <textarea id="char-background" rows="3" placeholder="角色的过去经历、身份背景、与其他角色的关系…"></textarea>
      </div>
      <div class="char-form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeCharModal()">取消</button>
        <button type="submit" class="btn btn-primary" id="char-submit-btn">添加角色</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api';
const PID = '{{ project_id }}';
let project = null;
let generating = false;

async function loadProject() {
  const res = await fetch(`${API}/project/${PID}`);
  if (!res.ok) { location.href='/'; return; }
  project = await res.json();
  applyProject();
}

function applyProject() {
  document.getElementById('project-title').textContent = project.title;
  document.getElementById('info-title').textContent = project.title || '—';
  document.getElementById('info-genre').textContent = project.genre || '—';
  document.getElementById('info-chapter').textContent = `第 ${project.writing_chapter} 章`;
  document.getElementById('info-chars').textContent = (project.characters || []).length + ' 人';

  if (project.outline && Object.keys(project.outline).length) {
    document.getElementById('info-status').textContent = '✓ 大纲就绪';
    document.getElementById('btn-round').disabled = false;
    document.getElementById('btn-round2').disabled = false;
    renderOutline(project.outline);
    document.getElementById('outline-empty').style.display = 'none';
    document.getElementById('outline-content').style.display = 'block';
  } else {
    document.getElementById('info-status').textContent = '○ 等待大纲';
  }

  if (project.characters && project.characters.length) {
    renderChars(project.characters);
  }

  if (project.novel_text) {
    document.getElementById('novel-panel').textContent = project.novel_text;
    document.getElementById('novel-tab-content').textContent = project.novel_text;
  }

  // 填充配置
  if (project.api_key) document.getElementById('cfg-api-key').value = project.api_key;
  if (project.base_url) document.getElementById('cfg-base-url').value = project.base_url;
  if (project.model) document.getElementById('cfg-model').value = project.model;
  if (project.temperature) {
    document.getElementById('cfg-temp').value = project.temperature;
    document.getElementById('temp-label').textContent = Number(project.temperature).toFixed(2);
  }
}

function renderChars(chars) {
  const el = document.getElementById('char-list');
  const emptyEl = document.getElementById('char-empty');
  if (!chars || chars.length === 0) {
    el.innerHTML = '';
    el.appendChild(emptyEl);
    emptyEl.style.display = '';
    document.getElementById('info-chars').textContent = '0 人';
    return;
  }
  emptyEl.style.display = 'none';
  const roleLabel = {protagonist:'主角',supporting:'配角',antagonist:'反派',tool:'工具人'};
  el.innerHTML = chars.map(c => `
    <div class="char-card" data-char-name="${escAttr(c.name)}">
      <div class="char-card-header">
        <span class="char-name">${esc(c.name)}</span>
        <span class="char-role ${esc(c.role||'')}">${esc(roleLabel[c.role]||'未设定')}</span>
      </div>
      ${c.personality ? `<div class="char-desc">性格：${esc(c.personality)}</div>` : ''}
      ${c.background ? `<div class="char-desc">背景：${esc(c.background)}</div>` : ''}
      ${c.appearance ? `<div class="char-desc">外貌：${esc(c.appearance)}</div>` : ''}
      <div class="char-actions">
        <button class="icon-btn edit-char-btn" title="编辑">✎</button>
        <button class="icon-btn danger del-char-btn" title="删除">✕</button>
      </div>
    </div>`).join('');

  // 绑定按钮事件（避免内联 onclick）
  el.querySelectorAll('.edit-char-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.closest('.char-card').dataset.charName;
      editChar(name);
    });
  });
  el.querySelectorAll('.del-char-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.closest('.char-card').dataset.charName;
      deleteChar(name);
    });
  });
  document.getElementById('info-chars').textContent = chars.length + ' 人';
}

// ── 角色弹窗 ──
let editingCharName = null;

function openCharModal(charData) {
  const overlay = document.getElementById('char-modal-overlay');
  const title = document.getElementById('char-modal-title');
  const submitBtn = document.getElementById('char-submit-btn');

  if (charData) {
    // 编辑模式
    title.textContent = '编辑角色';
    submitBtn.textContent = '保存修改';
    editingCharName = charData.name;
    document.getElementById('char-edit-name').value = charData.name;
    document.getElementById('char-name').value = charData.name;
    document.getElementById('char-role').value = charData.role || '';
    document.getElementById('char-appearance').value = charData.appearance || '';
    document.getElementById('char-personality').value = charData.personality || '';
    document.getElementById('char-background').value = charData.background || '';
  } else {
    // 新增模式
    title.textContent = '添加角色';
    submitBtn.textContent = '添加角色';
    editingCharName = null;
    document.getElementById('char-edit-name').value = '';
    document.getElementById('char-name').value = '';
    document.getElementById('char-role').value = '';
    document.getElementById('char-appearance').value = '';
    document.getElementById('char-personality').value = '';
    document.getElementById('char-background').value = '';
  }
  overlay.classList.add('show');
  setTimeout(() => document.getElementById('char-name').focus(), 50);
}

function closeCharModal() {
  document.getElementById('char-modal-overlay').classList.remove('show');
  editingCharName = null;
}

function editChar(name) {
  const chars = project.characters || [];
  const c = chars.find(x => x.name === name);
  if (c) openCharModal(c);
}

async function submitCharForm(e) {
  e.preventDefault();
  const data = {
    name: document.getElementById('char-name').value.trim(),
    role: document.getElementById('char-role').value,
    appearance: document.getElementById('char-appearance').value.trim(),
    personality: document.getElementById('char-personality').value.trim(),
    background: document.getElementById('char-background').value.trim(),
  };
  const isEdit = !!editingCharName;
  const url = isEdit
    ? `${API}/project/${PID}/character/${encodeURIComponent(editingCharName)}`
    : `${API}/project/${PID}/character`;

  const res = await fetch(url, {
    method: isEdit ? 'PUT' : 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({detail: '失败'}));
    toast(err.detail || '操作失败', 'error');
    return;
  }
  closeCharModal();
  // 重新加载项目
  await loadProject();
  toast(isEdit ? '✓ 角色已更新' : '✓ 角色已添加');
}

async function deleteChar(name) {
  if (!confirm(`确定删除角色「${name}」？`)) return;
  const res = await fetch(`${API}/project/${PID}/character/${encodeURIComponent(name)}`, {
    method: 'DELETE',
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    toast(err.detail || '删除失败', 'error');
    return;
  }
  await loadProject();
  toast('✓ 角色已删除');
}

function renderOutline(o) {
  const el = document.getElementById('outline-content');
  let html = '';

  // 主题
  const t = o.theme || {};
  if (t.theme) {
    html += `<div class="theme-block">
      <div class="panel-title" style="margin-bottom:0.5rem">核心主旨</div>
      <div class="theme-text">${esc(t.theme)}</div>
      ${t.purpose ? `<div class="theme-purpose">${esc(t.purpose)}</div>` : ''}
    </div>`;
  }

  // 段落剧情
  if (o.plot_paragraph) {
    html += `<div class="info-block" style="margin-bottom:1.5rem">
      <div class="panel-title" style="margin-bottom:0.5rem">段落剧情</div>
      <p style="font-size:0.88rem;line-height:1.8">${esc(o.plot_paragraph)}</p>
    </div>`;
  }

  // 世界观
  const w = o.world_building || {};
  if (w.location) {
    html += `<div class="world-block">
      <div class="panel-title" style="margin-bottom:0.75rem">世界观</div>
      <div class="info-row"><span class="info-label">时间</span><span class="info-value">${esc(w.time_period||'')}</span></div>
      <div class="info-row"><span class="info-label">地点</span><span class="info-value">${esc(w.location||'')}</span></div>
      ${w.atmosphere ? `<div class="info-row"><span class="info-label">氛围</span><span class="info-value">${esc(w.atmosphere)}</span></div>` : ''}
      ${(w.rules_of_world||[]).map(r => `<div class="world-rule">${esc(r)}</div>`).join('')}
    </div>`;
  }

  // 角色弧线
  const arcs = o.character_arcs || [];
  if (arcs.length) {
    html += `<div class="panel-title" style="margin-bottom:0.75rem">角色弧线</div>`;
    arcs.forEach(a => {
      html += `<div class="arc-block">
        <div class="arc-name">${esc(a.character_name||'')}</div>
        <div class="arc-arrow">${esc(a.initial_state||'')} → ${esc(a.final_state||'')}</div>
        ${(a.key_changes||[]).map(c => `<div class="arc-arrow" style="color:var(--muted)">• ${esc(c)}</div>`).join('')}
      </div>`;
    });
  }

  // 章节
  const chapters = o.chapters || [];
  if (chapters.length) {
    html += `<div class="panel-title" style="margin-bottom:0.75rem">章节规划</div>`;
    const current = project.writing_chapter || 1;
    chapters.forEach(ch => {
      const isCurrent = ch.chapter_number === current;
      html += `<div class="chapter-block${isCurrent ? ' current' : ''}">
        <div class="chapter-num">第 ${ch.chapter_number} 章</div>
        <div class="chapter-title">${esc(ch.chapter_title||'')}</div>
        ${ch.one_sentence ? `<div class="chapter-one-sentence">${esc(ch.one_sentence)}</div>` : ''}
        ${ch.expanded_paragraph ? `<p style="font-size:0.8rem;color:var(--muted);margin:0.4rem 0;line-height:1.6">${esc(ch.expanded_paragraph)}</p>` : ''}
        <div class="chapter-meta">
          ${(ch.characters_involved||[]).map(c => `<span>${esc(c)}</span>`).join('')}
          ${isCurrent ? '<span style="color:var(--accent)">◀ 当前</span>' : ''}
        </div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

async function generateOutline() {
  if (generating) return;
  const apiKey = document.getElementById('cfg-api-key').value.trim();
  const baseUrl = document.getElementById('cfg-base-url').value.trim() || 'https://dashscope.aliyuncs.com/compatible-mode/v1';
  const model = document.getElementById('cfg-model').value;
  if (!apiKey) { toast('请先填入 API Key', 'error'); return; }

  generating = true;
  setBtns(true);
  clearOutput();
  log('🔮 开始生成大纲…', 'phase');

  try {
    // 先保存配置
    await patchProject({api_key: apiKey, base_url: baseUrl, model});

    const res = await fetch(`${API}/project/${PID}/generate-outline`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({api_key: apiKey, model, base_url: baseUrl}),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '生成失败');

    project.outline = data;
    project.characters = data.character_arcs || [];
    project.writing_chapter = 1;
    await patchProject({
      outline: data,
      characters: data.character_arcs || [],
      writing_chapter: 1,
    });

    log('✅ 大纲生成完成', 'success');
    applyProject();
    toast('大纲生成完成！');
  } catch(e) {
    log('❌ ' + e.message, 'error');
    toast(e.message, 'error');
  } finally {
    generating = false;
    setBtns(false);
  }
}

async function generateRound() {
  if (generating) return;
  const apiKey = document.getElementById('cfg-api-key').value.trim();
  const baseUrl = document.getElementById('cfg-base-url').value.trim() || 'https://dashscope.aliyuncs.com/compatible-mode/v1';
  const model = document.getElementById('cfg-model').value;
  if (!apiKey) { toast('请先填入 API Key', 'error'); return; }
  if (!project.outline || !Object.keys(project.outline).length) {
    toast('请先生成大纲', 'error'); return;
  }

  generating = true;
  setBtns(true);
  showTab('output');
  log(`✍ 开始写作第 ${project.writing_chapter} 章…`, 'phase');

  const pb = document.getElementById('progress-bar');
  const pf = document.getElementById('progress-fill');
  pb.style.display = 'block';
  pf.style.width = '10%';

  try {
    await patchProject({api_key: apiKey, base_url: baseUrl, model});

    const res = await fetch(`${API}/project/${PID}/generate-round`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({api_key: apiKey, model, base_url: baseUrl}),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '生成失败');

    pf.style.width = '100%';
    log(`✅ 写作完成（${data.loops} 轮）`, 'success');

    // 重新加载
    const r2 = await fetch(`${API}/project/${PID}`);
    project = await r2.json();

    document.getElementById('novel-panel').textContent = project.novel_text || '';
    document.getElementById('novel-tab-content').textContent = project.novel_text || '';
    document.getElementById('info-chapter').textContent = `第 ${project.writing_chapter} 章`;
    toast('一段写作完成！');
  } catch(e) {
    log('❌ ' + e.message, 'error');
    toast(e.message, 'error');
  } finally {
    generating = false;
    setBtns(false);
    setTimeout(() => { pb.style.display='none'; pf.style.width='0%'; }, 1000);
  }
}

async function saveProject() {
  const apiKey = document.getElementById('cfg-api-key').value.trim();
  const baseUrl = document.getElementById('cfg-base-url').value.trim();
  const model = document.getElementById('cfg-model').value;
  const temp = parseFloat(document.getElementById('cfg-temp').value);
  document.getElementById('temp-label').textContent = temp.toFixed(2);
  await patchProject({api_key: apiKey, base_url: baseUrl, model, temperature: temp});
  toast('✓ 已保存');
}

async function deleteProject() {
  if (!confirm('确定删除此项目？')) return;
  await fetch(`${API}/project/${PID}`, {method:'DELETE'});
  location.href='/';
}

async function patchProject(data) {
  await fetch(`${API}/project/${PID}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data),
  });
}

function showTab(tab) {
  const outlineP  = document.getElementById('outline-panel');
  const novelP   = document.getElementById('novel-panel');
  const outputP  = document.getElementById('output-panel');
  const novelTP  = document.getElementById('novel-tab-panel');
  const tabs     = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));

  if (tab === 'outline') {
    outlineP.style.display = '';
    novelP.style.display = 'none';
    outputP.style.display = 'none';
    novelTP.style.display = 'none';
    tabs[2].classList.add('active');
  } else if (tab === 'novel') {
    outlineP.style.display = 'none';
    novelP.style.display = '';
    outputP.style.display = 'none';
    novelTP.style.display = 'none';
    tabs[1].classList.add('active');
  } else {
    outlineP.style.display = 'none';
    novelP.style.display = 'none';
    outputP.style.display = '';
    novelTP.style.display = 'flex';
    tabs[0].classList.add('active');
  }
}

function setBtns(disabled) {
  document.getElementById('btn-outline').disabled = disabled;
  document.getElementById('btn-round').disabled = disabled;
  document.getElementById('btn-outline2').disabled = disabled;
  document.getElementById('btn-round2').disabled = disabled;
}

function clearOutput() { document.getElementById('output-box').textContent = ''; }
function log(msg, kind='') {
  const el = document.getElementById('output-box');
  const span = document.createElement('div');
  span.className = 'log-entry' + (kind ? ' log-'+kind : '');
  span.textContent = `[${fmtTime()}] ${msg}`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function toast(msg, kind='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (kind ? ' '+kind : '');
  t.style.display = 'block';
  setTimeout(() => { t.style.display='none'; }, 2500);
}

function fmtTime() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadProject();
</script>
