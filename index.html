<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<!-- 样式内联（确保加载） -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0b0f;--surface:#16141a;--surface2:#1e1b24;--border:#2a2733;--text:#e8e4df;--muted:#7a7485;--accent:#c9a84c;--accent2:#8b5cf6;--danger:#e05c5c;--success:#4caf7d}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;background-image:radial-gradient(ellipse at 15% 0%,rgba(201,168,76,.06) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(139,92,246,.05) 0%,transparent 50%)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.btn{padding:.45rem 1.1rem;border-radius:6px;font-family:inherit;font-size:.85rem;cursor:pointer;border:1px solid transparent;transition:all .2s;font-weight:400}
.btn-primary{background:var(--accent);color:#0c0b0f;border-color:var(--accent)}
.btn-primary:hover{background:#d4b55a;box-shadow:0 0 18px rgba(201,168,76,.3)}
.btn-primary:disabled,.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{border-color:var(--muted);color:var(--text)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;padding:.2rem .4rem;border-radius:4px;transition:all .15s}
.icon-btn:hover{color:var(--text);background:var(--surface2)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:.5rem .7rem;width:100%;transition:border-color .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;border-bottom:1px solid var(--border);background:rgba(22,20,26,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:.5rem;cursor:pointer}
.logo-mark{color:var(--accent);font-size:1.4rem}
.logo-text{font-size:1.1rem;font-weight:300;letter-spacing:.05em}
.header-actions{display:flex;gap:.75rem;align-items:center}
.toolbar-label{font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace;margin-right:auto}
.main{padding:2rem;max-width:1200px;margin:0 auto}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.section-title{font-size:1.4rem;font-weight:300}
.count{font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-2px)}
.card-genre{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:.4rem}
.card-title{font-size:1.1rem;margin-bottom:.5rem}
.card-prompt{font-size:.8rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;justify-content:space-between;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.card-meta{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace}
.card-actions{position:absolute;top:.75rem;right:.75rem;opacity:0;transition:opacity .15s;display:flex;gap:.25rem}
.card:hover .card-actions{opacity:1}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:1rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:min(560px,95vw);max-height:90vh;overflow-y:auto;animation:slideUp .25s}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
.close-btn:hover{color:var(--text)}
.modal-form{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:.25rem}
.form-label{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace}
.form-actions{display:flex;justify-content:flex-end;gap:.75rem;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.layout{display:grid;grid-template-columns:300px 1fr 300px;height:calc(100vh - 60px);overflow:hidden}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem}
.main-area{display:flex;flex-direction:column;overflow:hidden;position:relative}
.main-area .content-wrapper{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.right-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;font-family:'DM Mono',monospace}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(22,20,26,.8)}
.tab{flex:1;padding:.6rem;text-align:center;font-size:.78rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Mono',monospace}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-content{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1rem}
.info-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.85rem}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;font-size:.85rem;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--muted);min-width:3em;flex-shrink:0}
.info-value{color:var(--text);text-align:right;flex:1}
.config-section{display:flex;flex-direction:column;gap:.6rem}
.control-row{display:flex;gap:.5rem;align-items:center}
.slider-label{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
input[type=range]{flex:1;height:3px;background:var(--border);border-radius:2px;border:none;padding:0;accent-color:var(--accent)}
.char-list{display:flex;flex-direction:column;gap:.4rem}
.characters-list{display:flex;flex-direction:column;gap:.6rem;width:100%}
.character-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem;transition:border-color .15s}
.character-item:hover{border-color:var(--accent)}
.character-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.character-name{color:var(--accent);font-weight:500;font-size:.9rem}
.character-actions{display:flex;gap:.35rem}
.character-role-tag{background:rgba(201,168,76,.08);color:var(--accent);padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-family:'DM Mono',monospace;margin-bottom:.5rem;display:inline-block}
.character-section{margin-bottom:.5rem;padding:.35rem .5rem;background:var(--surface2);border-left:2px solid var(--border);border-radius:4px}
.character-section:hover{border-left-color:var(--accent)}
.character-section.editable-field{cursor:pointer;transition:all .15s}
.character-section.editable-field:hover{background:rgba(201,168,76,.08);border-left-color:var(--accent)}
.section-label{font-size:.72rem;color:var(--muted);display:block;margin-bottom:.2rem;font-family:'DM Mono',monospace}
.section-content{font-size:.78rem;line-height:1.7;color:var(--text);display:block}
.arc-section{background:linear-gradient(to right, rgba(139,92,246,.05), transparent);border-left-color:#8b5cf6}
.arc-label{color:#8b5cf6}
.arc-content{display:flex;flex-direction:column;gap:.3rem;margin-top:.25rem}
.arc-state{display:flex;align-items:flex-start;gap:.35rem;font-size:.78rem;line-height:1.6;padding:.25rem;background:var(--surface);border-radius:4px}
.arc-state.initial{border-left:2px solid #10b981;padding-left:.5rem}
.arc-state.final{border-left:2px solid #f59e0b;padding-left:.5rem}
.state-icon{font-size:.85rem;flex-shrink:0}
.state-label{color:var(--muted);font-size:.7rem;font-family:'DM Mono',monospace;white-space:nowrap}
.changes-section{background:linear-gradient(to right, rgba(59,130,246,.05), transparent);border-left-color:#3b82f6}
.conflicts-section{background:linear-gradient(to right, rgba(239,68,68,.05), transparent);border-left-color:#ef4444}
.changes-list,.conflicts-list{list-style:none;padding:0;margin:.25rem 0 0;font-size:.78rem;line-height:1.7}
.changes-list li,.conflicts-list li{padding:.2rem .5rem;background:var(--surface);border-radius:3px;margin-bottom:.2rem;position:relative;padding-left:1.2rem}
.changes-list li:before,.conflicts-list li:before{content:'•';position:absolute;left:.4rem;color:var(--accent);font-weight:bold}
.character-meta-field{margin-top:.5rem;padding:.35rem .5rem;background:var(--surface2);border-radius:4px}
.character-meta-field.editable-field{cursor:pointer;transition:all .15s}
.character-meta-field.editable-field:hover{background:rgba(201,168,76,.08)}
.meta-label{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-right:.5rem;font-weight:500}
.meta-items{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.25rem}
.meta-item{background:var(--surface);border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;font-size:.75rem;color:var(--text);line-height:1.6;transition:all .15s}
.meta-item:hover{border-color:var(--accent);background:rgba(201,168,76,.08)}
.meta-item.conflict{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
.meta-item.conflict:hover{border-color:#ef4444;background:rgba(239,68,68,.1)}
.character-meta{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.character-tag{background:var(--surface2);padding:.15rem .45rem;border-radius:4px;font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace}
.character-tag.info{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.character-tag.empty{background:var(--surface2);color:var(--muted);border:1px dashed var(--border)}
.toolbar{display:flex;align-items:center;gap:.75rem;padding:.65rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(22,20,26,.7)}
.outline-scroll{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;min-height:0}
.outline-empty{color:var(--muted);text-align:center;padding:3rem;font-size:.9rem;line-height:2}
.chapter-block{margin-bottom:1.25rem;padding:1rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:border-color .2s}
.chapter-block:hover{border-color:rgba(201,168,76,.4)}
.chapter-block:hover .chapter-actions{opacity:1}
.chapter-block.current{border-color:var(--accent);box-shadow:0 0 20px rgba(201,168,76,.15)}
.chapter-block.editing{border-color:var(--accent); background:rgba(201,168,76,.03)}
.editable-field:hover{background:rgba(201,168,76,.05); border-radius:3px; cursor:text}
.empty-hint:hover{color:var(--accent)!important}
.theme-block .editable-field:hover{background:rgba(255,255,255,.08)}
.chapter-num{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.1em}
.chapter-title{font-size:1.05rem;color:var(--accent);margin:.3rem 0 .4rem}
.chapter-one-sentence{font-size:.82rem;color:var(--muted);font-style:italic;border-left:2px solid var(--border);padding-left:.75rem;margin:.4rem 0;line-height:1.6}
.chapter-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem}
.chapter-meta span{background:var(--surface2);padding:.15rem .5rem;border-radius:4px;font-size:.75rem;font-family:'DM Mono',monospace;color:var(--muted)}
.chapter-meta .cur{color:var(--accent)}
.theme-block{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(139,92,246,.08));border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.theme-text{font-size:1rem;color:var(--accent)}
.theme-purpose{font-size:.82rem;color:var(--muted);margin-top:.3rem}
.arc-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;margin-bottom:.6rem}
.arc-name{color:var(--accent2);font-size:.85rem;font-weight:500}
.arc-arrow{font-size:.75rem;color:var(--muted);margin:.2rem 0}
.world-rule{display:flex;align-items:flex-start;gap:.5rem;padding:.3rem 0;font-size:.82rem}
.world-rule::before{content:\25c8;color:var(--accent);flex-shrink:0}
.novel-text{flex:1;overflow-y:auto;padding:2rem 3rem;font-size:1.05rem;line-height:2.2;white-space:pre-wrap;word-break:break-word;max-width:800px;margin:0 auto;width:100%}
.novel-container{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.outline-container{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.novel-content-wrapper{flex:1;overflow:auto;position:relative}
.novel-toolbar{display:flex;justify-content:flex-end;gap:.5rem;padding:.5rem 2rem;border-top:1px solid var(--border);background:rgba(22,20,26,.8);flex-shrink:0}
.outline-toolbar{display:flex;justify-content:flex-end;gap:.5rem;padding:.5rem 2rem;border-top:1px solid var(--border);background:rgba(22,20,26,.95);flex-shrink:0}
#novel-editor{position:absolute;top:0;left:0;width:100%;height:100%;box-sizing:border-box;padding:2rem 3rem;font-size:1.05rem;line-height:2.2;white-space:pre-wrap;word-break:break-word;max-width:800px;margin:0 auto;border:none;outline:none;background:transparent;color:var(--text);font-family:'Noto Serif SC',serif;resize:none}
.output-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow-y:auto;padding:.75rem;font-family:'DM Mono',monospace;font-size:.73rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;color:var(--text);min-height:180px;max-height:55vh;flex:1}
.output-box:empty::before{content:'等待生成...';color:var(--muted)}
.log-entry{margin-bottom:.15rem}
.log-phase{color:var(--accent2)}
.log-error{color:var(--danger)}
.log-success{color:var(--success)}
.log-muted{color:var(--muted)}
.log-tool{color:var(--accent);font-size:.7rem}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:.4rem;display:none}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--accent);border-radius:8px;padding:.75rem 1.25rem;font-size:.85rem;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;animation:slideUp .2s ease;display:none}
.toast.error{border-color:var(--danger);color:var(--danger)}
@keyframes fadeIn{from{opacity:0}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}}
.hidden{display:none!important}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar,.right-panel{display:none}}
</style>
</head>
<body>
<div class="header">
  <div class="logo" id="logo-btn">
    <span class="logo-mark">&#10022;</span>
    <span class="logo-text">Novel Agents</span>
  </div>
  <div class="header-actions" id="header-actions">
    <button class="btn btn-primary" id="btn-new">+ 新建小说</button>

    <button class="btn btn-ghost" id="btn-settings-header">&#9881; 设置</button>
  </div>
</div>

<div class="main" id="page-home">
  <div class="section-header">
    <h1 class="section-title">项目库</h1>
    <span class="count" id="project-count">0 部作品</span>
  </div>
  <div class="grid" id="project-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">
    <div style="font-size:3rem;opacity:.5">&#128218;</div>
    <h3>还没有作品</h3>
    <p>点击上方「新建小说」开始第一部作品</p>
  </div>
</div>

<div class="layout hidden" id="page-project">
  <aside class="sidebar">
    <div>
      <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>小说信息</span>
        <button class="btn btn-ghost" id="btn-edit-project" style="padding:.2rem .5rem;font-size:.7rem">✎ 编辑</button>
      </div>
      <div class="info-block">
        <div class="info-row"><span class="info-label">标题</span><span class="info-value" id="info-title">-</span></div>
        <div class="info-row"><span class="info-label">类型</span><span class="info-value" id="info-genre">-</span></div>
        <div class="info-row"><span class="info-label">章节</span><span class="info-value" id="info-chapter">-</span></div>
        <div class="info-row"><span class="info-label">角色</span><span class="info-value" id="info-chars">-</span></div>
        <div class="info-row"><span class="info-label">状态</span><span class="info-value" id="info-status">-</span></div>
      </div>
    </div>
  </aside>

  <section class="main-area">
    <div class="toolbar">
      <span class="toolbar-label" id="toolbar-status">大纲</span>
      <button class="btn btn-primary" id="btn-outline">生成大纲</button>
      <button class="btn btn-ghost" id="btn-round" disabled onclick="window.generateRound(1)">写一段</button>
      <button class="btn btn-ghost" id="btn-show-outline">大纲</button>
      <button class="btn btn-ghost" id="btn-novel-tab">正文</button>
      <button class="btn btn-ghost" id="btn-save-text">保存正文</button>
    </div>
    <div class="content-wrapper">
      <!-- 大纲显示区 -->
      <div class="outline-container" id="outline-container">
        <div class="outline-scroll" id="outline-panel">
          <div class="outline-empty" id="outline-empty">
            <p>还没有生成大纲</p><p>配置模型后，点击「生成大纲」开始</p>
          </div>
          <div id="outline-content"></div>
        </div>
        <div class="outline-toolbar" id="outline-toolbar">
          <button class="btn btn-ghost" id="btn-add-outline-chapter">+ 章节</button>
          <button class="btn btn-ghost" id="btn-add-world-rule">+ 规则</button>
        </div>
      </div>
      
      <!-- 正文显示/编辑区 -->
      <div class="novel-container hidden" id="novel-container">
        <div class="novel-content-wrapper">
          <div class="novel-text" id="novel-panel"></div>
          <textarea id="novel-editor" class="hidden"></textarea>
        </div>
        <div class="novel-toolbar">
          <button class="btn btn-ghost" id="btn-edit-novel">✎ 编辑</button>
          <button class="btn btn-ghost" id="btn-save-novel" style="display:none">✓ 保存</button>
          <button class="btn btn-ghost" id="btn-cancel-novel" style="display:none">✕ 取消</button>
        </div>
      </div>
    </div>
  </section>

  <aside class="right-panel">
    <div class="panel-tabs">
      <div class="tab active" id="tab-output">输出</div>
      <div class="tab" id="tab-characters">角色</div>
    </div>
    <div class="panel-content" id="panel-output">
      <div class="output-box" id="output-box"></div>
    </div>
    <div class="panel-content hidden" id="panel-characters">
      <div class="characters-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <span style="font-size:.85rem;color:var(--muted);font-family:'DM Mono',monospace">项目角色</span>
        <button class="btn btn-primary" id="btn-add-character-panel" style="padding:.4rem .75rem;font-size:.75rem">+ 添加角色</button>
      </div>
      <div class="characters-list" id="characters-list"></div>
    </div>
    <div class="panel-content hidden" id="panel-outline">
      <div id="outline-sidebar-content" style="font-size:.85rem;line-height:1.8"></div>
    </div>
  </aside>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span>新建小说</span>
      <button class="close-btn" id="modal-close">&#10005;</button>
    </div>
    <form class="modal-form" id="form-new">
      <div class="form-group">
        <label class="form-label">标题</label>
        <input type="text" name="title" placeholder="例如：午夜书店" required>
      </div>
      <div class="form-group">
        <label class="form-label">类型</label>
        <select name="genre">
          <option value="悬疑推理">悬疑推理</option>
          <option value="都市言情">都市言情</option>
          <option value="科幻">科幻</option>
          <option value="奇幻">奇幻</option>
          <option value="历史">历史</option>
          <option value="恐怖">恐怖</option>
          <option value="武侠">武侠</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">初始设定</label>
